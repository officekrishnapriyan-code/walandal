<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07090F"/>
      <stop offset="100%" stop-color="#0C1119"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14E0D5"/>
      <stop offset="100%" stop-color="#8BD17C"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="rgba(20,224,213,0.25)"/>
      <stop offset="100%" stop-color="rgba(20,224,213,0)"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Mark -->
  <g transform="translate(80 80)" fill="none" stroke="url(#brand)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="0 60 36 18 72 60" opacity="0.45"/>
    <polyline points="20 60 56 18 92 60" opacity="0.75"/>
    <polyline points="40 60 76 18 112 60" opacity="1"/>
  </g>

  <text x="80" y="320" font-family="Inter, sans-serif" font-weight="800" font-size="80" fill="#F5F7FA" letter-spacing="-2">Engineering precision for a</text>
  <text x="80" y="410" font-family="Instrument Serif, serif" font-style="italic" font-size="92" fill="url(#brand)">regenerative planet.</text>

  <text x="80" y="520" font-family="JetBrains Mono, monospace" font-size="22" fill="#9AA8BD" letter-spacing="6">WAL &amp; AL · WATER · AIR · LAND · ALL</text>
</svg>
