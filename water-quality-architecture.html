<text x="980" y="219" font-size="9" fill="#555">2. Flutter sends JWT to API Gateway → Lambda validates token</text>
<text x="980" y="236" font-size="9" fill="#555">3. Cognito JWT carries district + tank-access roles</text>
<text x="980" y="253" font-size="9" fill="#555">4. Lambda queries DynamoDB → fetches only permitted tank data</text>
<text x="980" y="270" font-size="9" fill="#555">5. Lambda calls Bedrock with scoped data as context</text>
<text x="980" y="287" font-size="9" fill="#555">6. Bedrock generates natural-language answer</text>
<text x="980" y="304" font-size="9" fill="#555">7. Response returned — user never sees other districts' data</text>
<text x="980" y="321" font-size="9" fill="#555">8. Full audit trail logged in DynamoDB</text>
<text x="980" y="338" font-size="9" fill="#555">9. Supports: status queries, trend analysis, alert history, advice</text>
